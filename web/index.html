<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="test_1">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!--
    ════════════════════════════════════════════════════════
    GOOGLE SIGN-IN dla Web — wymagana konfiguracja:

    1. Firebase Console → Authentication → Sign-in method → Google
    2. Rozwiń "Web SDK configuration"
    3. Skopiuj "Web client ID" (123456789-xxx.apps.googleusercontent.com)
    4. Zastąp WKLEJ_TUTAJ_WEB_CLIENT_ID poniżej tym ID
    5. Google Cloud Console → APIs & Services → Credentials → edytuj Web client
       → dodaj http://localhost do "Authorized JavaScript origins"

    Bez tego kroku Google Sign-In wyświetla "logowanie anulowane" w Chrome.
    ════════════════════════════════════════════════════════
  -->
  <meta name="google-signin-client_id"
        content="897972952717-tgucdacutbi3cknoe5njtqh6ei7lorth.apps.googleusercontent.com">

  <title>test_1</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
